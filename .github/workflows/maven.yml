name: Maven Build (pom.xml)

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      jdk_distro:
        required: true
        type: string
      jdk_version:
        required: true
        type: string
      wolfssl_configure:
        required: true
        type: string

jobs:
  build_wolfcryptjni:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      # Cache the installed wolfSSL build. The key matches the one built
      # in linux-common.yml for the same configure flags, so this job
      # shares the cache with the main CI matrix.
      - name: Build native wolfSSL (cached)
        uses: ./.github/actions/build-wolfssl-cached
        with:
          configure: ${{ inputs.wolfssl_configure }}

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.jdk_distro }}
          java-version: ${{ inputs.jdk_version }}
          cache: 'maven'

      - name: Set LD_LIBRARY_PATH
        run: |
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/build-dir/lib" >> "$GITHUB_ENV"

      # Only copy appropriate makefile for platform currently being tested.
      # Use 'cat > ' rather than 'cp': macOS runners intermittently fail 'cp'
      # with "fcopyfile failed: Illegal byte sequence" when copyfile() tries to
      # replicate the source's extended attributes (e.g. com.apple.provenance).
      # Redirecting content copies only the file data and avoids that path.
      - name: Copy makefile
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
              cat makefile.linux > makefile
          elif [ "$RUNNER_OS" == "macOS" ]; then
              cat makefile.macosx > makefile
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
        shell: bash

      - name: Build JNI library
        run: PREFIX=$GITHUB_WORKSPACE/build-dir make

      # Maven build. A single mvn package runs the compile, test, and
      # package phases in one lifecycle pass. Separate compile, test,
      # and package steps would run the whole test suite twice, once
      # for the test step and again inside package.
      - name: mvn package
        run: mvn package

      - name: mvn clean
        run: mvn clean

